<!-- ========== PROMPTFORGE - SIGNUP PAGE ========== -->
<!-- FILE: signup.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromptForge · Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-md forge-nav">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <div class="brand-icon me-2"><i class="fas fa-hammer"></i></div>
          <span class="fw-bold fs-4">PromptForge</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="templates.html">Templates</a></li>
            <li class="nav-item"><a class="nav-link" href="pricing.html">Pricing</a></li>
            <li class="nav-item"><a class="nav-link forge-nav-cta" href="signup.html">Get started</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6">
            <div class="card forge-card p-4">
              <div class="text-center mb-4">
                <i class="fas fa-hammer fa-3x brand-violet mb-3"></i>
                <h2 class="fw-bold">Create your account</h2>
                <p class="text-secondary">Start forging perfect AI prompts today</p>
              </div>

              <form id="signupForm" onsubmit="return handleSignup(event);">
                <div class="mb-3">
                  <label class="form-label fw-semibold">Full name</label>
                  <input type="text" class="form-control" id="fullName" required />
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold">Email address</label>
                  <input type="email" class="form-control" id="email" required />
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold">Password</label>
                  <input type="password" class="form-control" id="password" required minlength="6" />
                  <small class="text-secondary">At least 6 characters</small>
                </div>

                <div class="mb-4">
                  <label class="form-label fw-semibold">Choose plan</label>
                  <select class="form-select" id="planSelect">
                    <option value="free">Free - $0/month</option>
                    <option value="pro">Pro - $12/month</option>
                    <option value="team">Team - $49/month</option>
                  </select>
                </div>

                <div class="mb-4 form-check">
                  <input type="checkbox" class="form-check-input" id="terms" required />
                  <label class="form-check-label" for="terms"
                    >I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label
                  >
                </div>

                <button type="submit" class="btn btn-forge w-100 py-3">Create account</button>
              </form>

              <div class="text-center mt-4">
                <p class="text-secondary">Already have an account? <a href="#" class="brand-violet">Log in</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="bg-white border-top py-4">
      <div class="container text-center text-secondary small"><span class="brand-violet">PromptForge</span> · craft the perfect AI prompts</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function handleSignup(event) {
        event.preventDefault();

        const name = document.getElementById("fullName").value;
        const email = document.getElementById("email").value;
        const plan = document.getElementById("planSelect").value;

        // Store user data in localStorage (simple demo)
        localStorage.setItem(
          "user",
          JSON.stringify({
            name: name,
            email: email,
            plan: plan,
            loggedIn: true,
          }),
        );

        alert(`Welcome ${name}! Your ${plan} account has been created successfully.`);
        window.location.href = "index.html";
        return false;
      }
    </script>
  </body>
</html>
